<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PAINTING IS LIFE - Enterprise Drawing Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-core">
        <header class="app-navbar">
            <div class="brand-zone">
                <div class="brand-avatar">PIL</div>
                <div class="brand-meta">
                    <h1>PAINTING IS LIFE</h1>
                    <span class="version-tag">v2026.1 - Professional</span>
                </div>
            </div>
            
            <div class="system-actions">
                <button id="undoBtn" class="nav-icon-btn" title="Geri Al" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/></svg>
                </button>
                <button id="redoBtn" class="nav-icon-btn" title="İleri Al" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 7v6h-6M3 17a9 9 0 019-9 9 9 0 016 2.3l3 2.7"/></svg>
                </button>
                <div class="divider-v"></div>
                <button id="clearBtn" class="nav-icon-btn danger" title="Tuvali Temizle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                </button>
                <button id="exportBtn" class="btn-primary">4K Masterpiece İndir</button>
            </div>
        </header>

        <div class="app-workspace">
            <aside class="panel side-left">
                <div class="panel-header">FIRCALAR</div>
                <div class="tool-matrix">
                    <div class="tool-cell active" data-tool="pen">
                        <div class="tool-icon-wrapper">🖊️</div>
                        <span>İnce Kalem</span>
                    </div>
                    <div class="tool-cell" data-tool="brush">
                        <div class="tool-icon-wrapper">🖌️</div>
                        <span>Sanat Fırçası</span>
                    </div>
                    <div class="tool-cell" data-tool="marker">
                        <div class="tool-icon-wrapper">🖍️</div>
                        <span>Markör</span>
                    </div>
                    <div class="tool-cell" data-tool="glow">
                        <div class="tool-icon-wrapper">✨</div>
                        <span>Neon Işık</span>
                    </div>
                    <div class="tool-cell" data-tool="spray">
                        <div class="tool-icon-wrapper">💨</div>
                        <span>Hava Spreyi</span>
                    </div>
                    <div class="tool-cell" data-tool="eraser">
                        <div class="tool-icon-wrapper">🧽</div>
                        <span>Hassas Silgi</span>
                    </div>
                </div>

                <div class="panel-header" style="margin-top: auto;">PARAMETRELER</div>
                <div class="control-deck">
                    <div class="slider-node">
                        <div class="slider-header">
                            <span>Kalınlık</span>
                            <span id="lblSize" class="badge">12px</span>
                        </div>
                        <input type="range" id="sliderSize" min="1" max="200" value="12">
                    </div>
                    <div class="slider-node">
                        <div class="slider-header">
                            <span>Opaklık</span>
                            <span id="lblOpacity" class="badge">100%</span>
                        </div>
                        <input type="range" id="sliderOpacity" min="1" max="100" value="100">
                    </div>
                </div>
            </aside>

            <main class="render-stage">
                <div class="canvas-shadow-box">
                    <canvas id="engineCanvas"></canvas>
                </div>
            </main>

            <aside class="panel side-right">
                <div class="panel-header">SPEKTRUM</div>
                <div class="color-picker-container">
                    <input type="color" id="nativeColorPicker" value="#4f46e5">
                    <div class="color-picker-label">Gelişmiş Renk Uzayı</div>
                </div>

                <div class="panel-header" style="margin-top: 15px;">HIZLI PALET</div>
                <div class="palette-grid" id="staticPalette">
                    <div class="palette-swatch active" style="background: #4f46e5;" data-hex="#4f46e5"></div>
                    <div class="palette-swatch" style="background: #ef4444;" data-hex="#ef4444"></div>
                    <div class="palette-swatch" style="background: #10b981;" data-hex="#10b981"></div>
                    <div class="palette-swatch" style="background: #f59e0b;" data-hex="#f59e0b"></div>
                    <div class="palette-swatch" style="background: #ec4899;" data-hex="#ec4899"></div>
                    <div class="palette-swatch" style="background: #06b6d4;" data-hex="#06b6d4"></div>
                    <div class="palette-swatch" style="background: #1e1b4b;" data-hex="#1e1b4b"></div>
                    <div class="palette-swatch" style="background: #000000;" data-hex="#000000"></div>
                    <div class="palette-swatch" style="background: #71717a;" data-hex="#71717a"></div>
                    <div class="palette-swatch" style="background: #ffffff;" data-hex="#ffffff"></div>
                </div>

                <div class="panel-header" style="margin-top: auto;">KATMANLAR (LAYERS)</div>
                <div class="layer-stack">
                    <div class="layer-row active">
                        <div class="layer-thumb">🎨</div>
                        <div class="layer-meta">Çizim Katmanı</div>
                        <div class="layer-opt">👁️</div>
                    </div>
                    <div class="layer-row background-locked">
                        <div class="layer-thumb bg-white"></div>
                        <div class="layer-meta">Arka Plan</div>
                        <div class="layer-opt">🔒</div>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
