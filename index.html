<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAINTING IS LIFE - Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">PIL</div>
            <div class="tool-icon active" id="brush" title="Fırça">🖌️</div>
            <div class="tool-icon" id="eraser" title="Silgi">🧽</div>
            <div class="tool-icon" id="spray" title="Sprey">💨</div>
            <div class="tool-icon" id="glow" title="Neon">✨</div>
        </aside>

        <main class="main-workspace">
            <header class="app-header">
                <h1>PAINTING IS LIFE</h1>
                <button id="exportBtn" class="action-btn success">4K Kaydet</button>
            </header>
            
            <div class="canvas-area">
                <canvas id="ultraCanvas"></canvas>
            </div>

            <footer class="bottom-controls">
                <div class="control-group">
                    <label for="colorPicker">Renk</label>
                    <input type="color" id="colorPicker" value="#6366f1">
                </div>
                <div class="control-group">
                    <label for="sizeSlider">Boyut (<span id="sizeVal">15</span>px)</label>
                    <input type="range" id="sizeSlider" min="1" max="150" value="15">
                </div>
                <div class="control-group">
                    <label for="opacitySlider">Opaklık (<span id="opacityVal">100</span>%)</label>
                    <input type="range" id="opacitySlider" min="1" max="100" value="100">
                </div>
                <div class="control-group">
                    <button id="clearBtn" class="action-btn danger">Temizle</button>
                </div>
            </footer>
        </main>

        <aside class="layer-panel">
            <h3>KATMANLAR</h3>
            <div class="layer-list">
                <div class="layer-item active">
                    <span>Çizim Katmanı</span>
                    <span class="eye-icon">👁️</span>
                </div>
                <div class="layer-item locked">
                    <span>Arka Plan</span>
                    <span class="eye-icon">👁️</span>
                </div>
            </div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
